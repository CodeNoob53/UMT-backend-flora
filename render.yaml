services:
  - type: web
    name: umt-backend-flora
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: DB_URL
        fromDatabase:
          name: umt-backend-flora-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: CLD_NAME
        sync: false
      - key: CLD_API_KEY
        sync: false
      - key: CLD_API_SECRET
        sync: false
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASSWORD
        sync: false

databases:
  - name: umt-backend-flora-db
    plan: free
    region: frankfurt
    databaseName: flora_db
    user: flora_user
    postgresMajorVersion: "16"
